<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC - DevOps</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { display: inline-block; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input, button { margin: 10px; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste sua Saúde</h1>
        <input type="number" id="peso" placeholder="Peso (kg)" step="0.1"><br>
        <input type="number" id="altura" placeholder="Altura (m)" step="0.01"><br>
        <button onclick="exibirIMC()">Calcular</button>
        <h2 id="resultado"></h2>
    </div>

    <script src="imc.js"></script>
    <script>
        function exibirIMC() {
            let peso = parseFloat(document.getElementById('peso').value);
            let altura = parseFloat(document.getElementById('altura').value);
            let imc = calcularIMC(peso, altura);
            document.getElementById('resultado').innerText = "Seu IMC é: " + imc;
        }
    </script>
</body>
</html>
